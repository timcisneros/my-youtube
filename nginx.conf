# my-youtube production nginx config
# Place in /etc/nginx/sites-available/my-youtube
# Adjust server_name and ssl_certificate paths

upstream my_youtube {
    # Cluster workers on the same machine
    server 127.0.0.1:3000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=extraction:10m rate=2r/m;

server {
    listen 80;
    server_name yourtube.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourtube.example.com;

    # TLS — adjust paths
    ssl_certificate /etc/letsencrypt/live/yourtube.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourtube.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (match Express CSP)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header X-DNS-Prefetch-Control off always;

    # Connection buffering — absorb slow clients
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;

    # Gzip (text only — Express handles API responses)
    gzip on;
    gzip_types text/css application/javascript application/json text/plain application/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Static assets — serve directly, bypass Node
    location /public/ {
        alias /path/to/my-youtube/public/;
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /vendor/ {
        alias /path/to/my-youtube/node_modules/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /fonts/ {
        alias /path/to/my-youtube/public/fonts/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Poster/thumbnail cache — immutable per video
    location ~ ^/api/stream/[^/]+/(poster|thumb)$ {
        proxy_pass http://my_youtube;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 24h;
        proxy_cache poster_cache;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Storyboard sheets — cache aggressively
    location ~ ^/api/stream/[^/]+/storyboard/ {
        proxy_pass http://my_youtube;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 24h;
        proxy_cache storyboard_cache;
    }

    # Stream segments — pass through, don't buffer (large responses)
    location ~ ^/api/stream/ {
        proxy_pass http://my_youtube;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;  # Don't buffer video segments
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # SSE extraction status — long-lived connections
    location ~ ^/api/stream/[^/]+/status$ {
        proxy_pass http://my_youtube;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # All other routes — standard proxy with rate limiting
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://my_youtube;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Cache zones (add to nginx.conf http block)
# proxy_cache_path /var/cache/nginx/poster levels=1:2 keys_zone=poster_cache:10m max_size=1g inactive=24h;
# proxy_cache_path /var/cache/nginx/storyboard levels=1:2 keys_zone=storyboard_cache:10m max_size=2g inactive=24h;
